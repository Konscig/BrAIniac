services:
  db:
    image: postgres:14
    container_name: db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=${PG_DB}
    env_file:
      - .env.docker
    ports: 
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - brainiac-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PG_USER}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
      start_interval: 5s

  backend:
    build: ./backend
    container_name: api
    profiles: ["app"]
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - PRISMA_MIGRATE=${PRISMA_MIGRATE:-deploy}
      - PRISMA_DB_PUSH_ACCEPT_DATA_LOSS=1
      - MCP_ENABLED=${MCP_ENABLED:-true}
      - MCP_PATH=${MCP_PATH:-/mcp}
      - HTTP_ENABLE_CLUSTER=${HTTP_ENABLE_CLUSTER:-false}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:3000"
    networks:
     - brainiac-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    command: >
      sh -c "
      if [ "$$PRISMA_MIGRATE" = "deploy" ]; then
        npx prisma migrate deploy;
      else
        # Dev default: always accept data loss to ensure schema sync
        npx prisma db push --accept-data-loss;
      fi &&
      node dist/index.js
      "

  db-tests:
    image: node:20-alpine
    container_name: db-tests
    profiles: ["tests"]
    restart: "no"
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - brainiac-network
    command: >
      sh -c "
      npm install &&
      npm run prisma:reset &&
      npm run test:db
      "

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:8080}
    container_name: frontend
    profiles: ["app"]
    restart: unless-stopped
    ports:
      - 3000:80
    networks:
      - brainiac-network


networks:
  brainiac-network:
    driver: bridge

volumes:
  postgres_data:    
