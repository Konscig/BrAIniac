services:
  db:
    image: postgres:14
    container_name: db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=${PG_DB}
    env_file:
      - .env.docker
    ports: 
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - brainiac-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PG_USER}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
      start_interval: 5s

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - PORT=3000
      - PRISMA_MIGRATE=${PRISMA_MIGRATE:-deploy}
      - PRISMA_DB_PUSH_ACCEPT_DATA_LOSS=1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:3000"
    networks:
     - brainiac-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    command: >
      sh -c "
      if [ "$$PRISMA_MIGRATE" = "deploy" ]; then
        npx prisma migrate deploy;
      else
        # Dev default: always accept data loss to ensure schema sync
        npx prisma db push --accept-data-loss;
      fi &&
      node dist/index.js
      "

  db-tests:
    image: node:20-alpine
    container_name: db-tests
    restart: "no"
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - brainiac-network
    command: >
      sh -c "
      npm install &&
      npm run prisma:reset &&
      npm run test:db
      "

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - 3000:80
    networks:
      - brainiac-network

  judge-eval-worker:
    build: ./judge-eval-worker
    container_name: judge-eval-worker
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/cache/huggingface
      - TRANSFORMERS_CACHE=/cache/huggingface
    volumes:
      - hf_cache:/cache/huggingface
    networks:
      - brainiac-network
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s


networks:
  brainiac-network:
    driver: bridge

volumes:
  postgres_data:
  hf_cache: