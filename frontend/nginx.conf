server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # /auth — особый случай: голый /auth это SPA-страница регистрации,
    # /auth/login и /auth/signup — backend
    location ~ ^/auth/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Остальные backend ручки — c концевым слешом или без
    location ~ ^/(users|projects|datasets|nodes|edges|tools|node-types|pipelines|judge|tool-executor)(/|$) {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Backend healthcheck (точный путь)
    location = /health {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback для React Router (включая /auth)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
